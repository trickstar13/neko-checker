<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="header">
    <span class="header-icon">🐈‍⬛</span>
    <h1>NEKO Checker</h1>
  </header>

  <div id="status-ok" class="status-ok" hidden>
    <p data-i18n="statusOk"></p>
  </div>

  <section id="section-og" class="section" hidden>
    <h2 class="section-title section-title--og">
      <span class="dot dot--og"></span>
      <span data-i18n="sectionOg"></span>
      <span id="count-og" class="count"></span>
    </h2>
    <ul id="list-og" class="list"></ul>
  </section>

  <section id="section-logs" class="section" hidden>
    <h2 class="section-title section-title--logs">
      <span class="dot dot--logs"></span>
      <span data-i18n="sectionLogs"></span>
      <span id="count-logs" class="count"></span>
    </h2>
    <ul id="list-logs" class="list"></ul>
  </section>

  <section id="section-errors" class="section" hidden>
    <h2 class="section-title section-title--errors">
      <span class="dot dot--errors"></span>
      <span data-i18n="sectionErrors"></span>
      <span id="count-errors" class="count"></span>
    </h2>
    <ul id="list-errors" class="list"></ul>
  </section>

  <section id="section-network" class="section" hidden>
    <h2 class="section-title section-title--network">
      <span class="dot dot--network"></span>
      <span data-i18n="sectionNetwork"></span>
      <span id="count-network" class="count"></span>
    </h2>
    <ul id="list-network" class="list"></ul>
  </section>

  <footer class="footer">
    <p>DevTools: <kbd>F12</kbd> / <kbd>⌥⌘I</kbd></p>
    <a href="#" id="open-settings" class="settings-btn" data-i18n="settingsBtn"></a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
