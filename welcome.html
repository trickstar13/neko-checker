<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="welcome.css">
</head>
<body>
  <div class="container">
    <header class="hero">
      <span class="hero-icon">🐈‍⬛</span>
      <h1 data-i18n="welcomeTitle"></h1>
      <p class="hero-sub" data-i18n="welcomeThanks"></p>
    </header>

    <section class="card">
      <h2 data-i18n="welcomePinTitle"></h2>
      <ol class="steps">
        <li data-i18n="welcomeStep1"></li>
        <li data-i18n="welcomeStep2"></li>
        <li data-i18n="welcomeStep3"></li>
      </ol>
    </section>

    <section class="card">
      <h2 data-i18n="welcomeExpTitle"></h2>
      <div class="expressions">
        <div class="exp"><img src="icons/neko-base.png" alt="base" width="32" height="32"><span data-i18n="welcomeExpBase"></span></div>
        <div class="exp"><div class="exp-icon-wrap exp-icon--og"><img src="icons/neko-og.png" alt="og" width="32" height="32"></div><span data-i18n="welcomeExpOg"></span></div>
        <div class="exp"><div class="exp-icon-wrap exp-icon--logs"><img src="icons/neko-logs.png" alt="logs" width="32" height="32"></div><span data-i18n="welcomeExpLogs"></span></div>
        <div class="exp"><div class="exp-icon-wrap exp-icon--errors"><img src="icons/neko-errors.png" alt="errors" width="32" height="32"></div><span data-i18n="welcomeExpErrors"></span></div>
        <div class="exp"><div class="exp-icon-wrap exp-icon--multi"><img src="icons/neko-multi.png" alt="multi" width="32" height="32"></div><span data-i18n="welcomeExpMulti"></span></div>
      </div>
    </section>

    <p class="ready" data-i18n="welcomeReady"></p>
  </div>

  <script src="welcome.js"></script>
</body>
</html>
